[main]
include=~/.config/foot/themes/matugen

shell=fish
#title=foot
#font=Maple Mono NF CN:size=12
font=Luxi Mono:size=12,汉仪玄宋:size=12
letter-spacing=0
dpi-aware=no
pad=10x10
bold-text-in-bright=no
gamma-correct-blending=no
initial-window-size-pixels= 1024x800

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[colors]
alpha=1

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
