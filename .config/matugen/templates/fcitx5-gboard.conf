[Metadata]
Name=Matugen Gboard Boxy
Version=1
Author=Matugen
Description=Boxy Material style generated by Matugen
ScaleWithDPI=True

[InputPanel]
Font=Sans 12
# 正常文字颜色
NormalColor={{colors.on_surface.default.hex}}
# 选中项文字颜色 (反白)
HighlightCandidateColor={{colors.on_primary.default.hex}}
# 预编辑文字颜色
HighlightColor={{colors.primary.default.hex}}
HighlightBackgroundColor=#00000000
Spacing=3

[InputPanel/TextMargin]
Left=8
Right=8
Top=6
Bottom=6

[InputPanel/Background]
# 背景色
Color={{colors.surface_container_high.default.hex}}
# 边框颜色 (使用 Outline 颜色，对比度更高)
BorderColor={{colors.outline.default.hex}}
# 边框宽度 (设置为 2 以强调边框)
BorderWidth=2
# 圆角设置为 0
Radius=0

[InputPanel/Highlight]
# 选中项背景色
Color={{colors.primary.default.hex}}

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[InputPanel/Highlight/Background]
Color={{colors.primary.default.hex}}
# 选中项背景圆角设置为 0
Radius=0
# 微调边距，让高亮块填满一点
MarginLeft=2
MarginRight=2
MarginTop=2
MarginBottom=2

[Menu]
Font=Sans 12
NormalColor={{colors.on_surface.default.hex}}
HighlightColor={{colors.on_surface.default.hex}}
Spacing=3

[Menu/Background]
Color={{colors.surface_container.default.hex}}
BorderColor={{colors.outline.default.hex}}
# 菜单边框加粗
BorderWidth=2
# 菜单圆角去除
Radius=0

[Menu/Highlight]
Color={{colors.secondary_container.default.hex}}

[Menu/Highlight/Margin]
Left=8
Right=8
Top=5
Bottom=5

[Menu/ContentMargin]
Left=5
Right=5
Top=5
Bottom=5

[Menu/Separator]
Color={{colors.outline_variant.default.hex}}
