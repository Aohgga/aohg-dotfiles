[templates.wallpaper]
input_path = '~/.config/matugen/templates/wallpaper'
output_path = '~/.config/scripts/wallpaper'

[templates.waybar-labwc]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/labwc/waybar/colors.css'
