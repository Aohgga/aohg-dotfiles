# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER+SHIFT,Return,spawn,foot
bind=SUPER,d,spawn,~/.config/scripts/rofi

# exit
bind=SUPER,m,quit
bind=SUPER,Q,killclient,

# switch window focus
bind=SUPER,backslash,focuslast,
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# swap window
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,j,exchange_stack_client,next
bind=SUPER+CTRL,k,exchange_stack_client,prev

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,grave,toggleoverview,
bind=SUPER,space,togglefloating,
bind=SUPER+SHIFT,grave,toggleoverlay,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,s,minimized,
bind=SUPER+SHIFT,s,restore_minimized
bind=SUPER+SHIFT,r,toggle_render_border
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=SUPER+shift,plus,set_proportion,1.0
bind=SUPER+shift,underscore,set_proportion,0.5
bind=SUPER,0,switch_proportion_preset,
#bind=SUPER,minus,increase_proportion,-0.1
#bind=SUPER,equal,increase_proportion,0.1
bind=SUPER,minus,resizewin,-10,+0
bind=SUPER,equal,resizewin,+10,+0

# tile layout
bind=SUPER+CTRL,h,incnmaster,+1
bind=SUPER+CTRL,l,incnmaster,-1
bind=SUPER,h,setmfact,-0.01
bind=SUPER,l,setmfact,+0.01
bind=SUPER,Return,zoom,

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=SHIFT+CTRL+SUPER,l,setlayout,scroller
#bind=SUPER,n,switch_layout

# tag switch
bind=SUPER+CTRL,u,viewtoleft_have_client,
bind=SUPER+CTRL,o,viewtoright_have_client,

bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER,0,view,0
bind=SUPER,u,viewtoleft
bind=SUPER,o,viewtoright

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9
bind=SUPER+SHIFT,u,tagtoleft
bind=SUPER+SHIFT,o,tagtoright

bind=SUPER+CTRL,1,toggletag,1
bind=SUPER+CTRL,2,toggletag,2
bind=SUPER+CTRL,3,toggletag,3
bind=SUPER+CTRL,4,toggletag,4
bind=SUPER+CTRL,5,toggletag,5
bind=SUPER+CTRL,6,toggletag,6
bind=SUPER+CTRL,7,toggletag,7
bind=SUPER+CTRL,8,toggletag,8
bind=SUPER+CTRL,9,toggletag,9

bind=ALT,1,toggleview,1
bind=ALT,2,toggleview,2
bind=ALT,3,toggleview,3
bind=ALT,4,toggleview,4
bind=ALT,5,toggleview,5
bind=ALT,6,toggleview,6
bind=ALT,7,toggleview,7
bind=ALT,8,toggleview,8
bind=ALT,9,toggleview,9

# monitor switch
bind=Super,comma,focusmon,left
bind=Super,period,focusmon,right
bind=SUPER+SHIFT,comma,tagmon,left
bind=SUPER+SHIFT,period,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

bind=SUPER,c,centerwin

# smartmovewin
bind=CTRL+SHIFT,Up,smartmovewin,up
bind=CTRL+SHIFT,Down,smartmovewin,down
bind=CTRL+SHIFT,Left,smartmovewin,left
bind=CTRL+SHIFT,Right,smartmovewin,right

# movewin
bind=SUPER+ALT,k,movewin,+0,-50
bind=SUPER+ALT,j,movewin,+0,+50
bind=SUPER+ALT,h,movewin,-50,+0
bind=SUPER+ALT,l,movewin,+50,+0

# smartresizewin
bind=CTRL+ALT,Up,smartresizewin,up
bind=CTRL+ALT,Down,smartresizewin,down
bind=CTRL+ALT,Left,smartresizewin,left
bind=CTRL+ALT,Right,smartresizewin,right

# resizewin
bind=SUPER+SHIFT,k,resizewin,+0,-25
bind=SUPER+SHIFT,j,resizewin,+0,+25
bind=SUPER+SHIFT,h,resizewin,-25,+0
bind=SUPER+SHIFT,l,resizewin,+25,+0

#音量和亮度
bindl=NONE,XF86AudioRaiseVolume,spawn,~/.config/scripts/volume sink 5%+
bindl=SHIFT,XF86AudioRaiseVolume,spawn,~/.config/scripts/volume sink 1%+
bindl=NONE,XF86AudioLowerVolume,spawn,~/.config/scripts/volume sink 5%-
bindl=SHIFT,XF86AudioLowerVolume,spawn,~/.config/scripts/volume sink 1%-
bindl=NONE,XF86AudioMute,spawn,~/.config/scripts/volume sink mute
bindl=NONE,XF86MonBrightnessUp,spawn,~/.config/scripts/bright 5%+
bindl=SHIFT,XF86MonBrightnessUp,spawn,~/.config/scripts/bright 1%+
bindl=NONE,XF86MonBrightnessDown,spawn,~/.config/scripts/bright 5%-
bindl=SHIFT,XF86MonBrightnessDown,spawn,~/.config/scripts/bright 1%-


#custom app bind
bind=SUPER,t,spawn,foot -a float_term -T 后台 tray-tui
bind=SUPER,e,spawn,foot yazi
bind=SUPER,w,spawn,waypaper
#bind=SUPER,semicolon,spawn,rofimoji --action copy
bind=SUPER,semicolon,spawn,~/.config/scripts/emoji
bind=SUPER,p,spawn,foot -a float_term -T 音频 wiremix
#bind=SUPER,b,spawn,swayimg -g /home/aohg/Pictures/Wallpapers/
#bind=SUPER,Escape,spawn,~/.config/scripts/logout
bind=SUPER,Escape,spawn,nwg-bar
bind=SUPER,v,spawn,~/.config/scripts/cliphist
bind=NONE,Print,spawn,~/.config/scripts/screenshot
bind=Super,Print,spawn,~/.config/scripts/screenshot f
bind=SUPER,BackSpace,spawn,swaylock
bind=SUPER,i,spawn,foot -a float_term -T 网络 impala
bind=SUPER,b,spawn,foot -a float_term -T 蓝牙 bluetui
#bind=SUPER+SHIFT,c,spawn,~/.config/scripts/colors/yin-yang
bind=SUPER+SHIFT,t,spawn,rofi -show 类型 -modes "类型:~/.config/scripts/colors/matugen-type"
bind=SUPER+CTRL,t,spawn,rofi -show 主题 -modes "主题:~/.config/scripts/colors/theme"

bind=None,KP_7,spawn,ydotool mousemove -x -14 -y -14
bind=None,KP_8,spawn,ydotool mousemove -x 0 -y -20
bind=None,KP_9,spawn,ydotool mousemove -x 14 -y -14
bind=None,KP_4,spawn,ydotool mousemove -x -20 -y 0
bind=None,KP_5,spawn,ydotool click 0xC0
bind=None,KP_0,spawn,ydotool click 0xC1
bind=None,KP_6,spawn,ydotool mousemove -x 20 -y 0
bind=None,KP_1,spawn,ydotool mousemove -x -14 -y 14
bind=None,KP_2,spawn,ydotool mousemove -x 0 -y 20
bind=None,KP_3,spawn,ydotool mousemove -x 14 -y 14
bind=None,KP_Multiply,spawn,ydotool mousemove -w -x 0 -y 1
bind=None,KP_Subtract,spawn,ydotool mousemove -w -x 0 -y -1

bind=SHIFT,KP_Home,spawn,ydotool mousemove -x -7 -y -7
bind=SHIFT,KP_Up,spawn,ydotool mousemove -x 0 -y -10
bind=SHIFT,KP_Prior,spawn,ydotool mousemove -x 7 -y -7
bind=SHIFT,KP_Left,spawn,ydotool mousemove -x -10 -y 0
