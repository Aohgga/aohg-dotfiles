bind=SHIFT,KP_Insert,spawn,ydotool click 0xC1
bind=SHIFT,KP_Right,spawn,ydotool mousemove -x 10 -y 0
bind=SHIFT,KP_End,spawn,ydotool mousemove -x -7 -y 7
bind=SHIFT,KP_Down,spawn,ydotool mousemove -x 0 -y 10
bind=SHIFT,KP_Next,spawn,ydotool mousemove -x 7 -y 7
bind=SHIFT,KP_Multiply,spawn,ydotool mousemove -w -x -1 -y 0
bind=SHIFT,KP_Subtract,spawn,ydotool mousemove -w -x 1 -y 0

